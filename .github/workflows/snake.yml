name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: iamjoeljose
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=F2A900&color_dots=0A0E14,1F6FEB,1F6FEB,F2A900,F2A900
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
