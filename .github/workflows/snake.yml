name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: iamjoeljose
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00FF9C&color_dots=0D1117,0AC18E,0AC18E,00FF9C,00FF9C
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
